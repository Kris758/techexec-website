# Production site: https://techexecsolution.com (root base). Override with repo variable CUSTOM_SITE_URL if needed.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set Vite base path for GitHub Pages
        env:
          CUSTOM_SITE_URL: ${{ vars.CUSTOM_SITE_URL }}
        run: |
          # Custom domain is served at / — not /repo/. Default: techexecsolution.com
          SITE="${CUSTOM_SITE_URL:-https://techexecsolution.com}"
          SITE="${SITE%/}"
          echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          echo "VITE_SITE_URL=${SITE}" >> "$GITHUB_ENV"

      - name: Install and build
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
